  repeated bool adaptive_pressure_advance = 43 [
    (label)     = "Enable adaptive pressure advance (beta)",
    (tooltip)     = "With increasing print speeds (and hence increasing volumetric flow through the nozzle) and increasing accelerations, it has been observed that the effective PA value typically decreases. This means that a single PA value is not always 100% optimal for all features and a compromise value is usually used that does not cause too much bulging on features with lower flow speed and accelerations while also not causing gaps on faster features.\\n\\nThis feature aims to address this limitation by modeling the response of your printer's extrusion system depending on the volumetric flow speed and acceleration it is printing at. Internally, it generates a fitted model that can extrapolate the needed pressure advance for any given volumetric flow speed and acceleration, which is then emitted to the printer depending on the current print conditions.\\n\\nWhen enabled, the pressure advance value above is overridden. However, a reasonable default value above is strongly recommended to act as a fallback and for when tool changing.\\n\\n",
    (category)     = "Filament/Filament",
    (tab_type)     = "Filament",
    (tab_page)     = "Filament",
    (tab_optgroup)     = "Flow ratio and Pressure Advance",
    (mode)        = MODE_ADVANCED,
    (preset)      = PRESET_FILAMENT,
    (has_default)  = true,
    (default_value) = "false"
  ];


  repeated string adaptive_pressure_advance_model = 44 [
    (label)     = "Adaptive pressure advance measurements (beta)",
    (tooltip)     = "Add sets of pressure advance (PA) values, the volumetric flow speeds and accelerations they were measured at, separated by a comma. One set of values per line. For example\\n0.04,3.96,3000\\n0.033,3.96,10000\\n0.029,7.91,3000\\n0.026,7.91,10000\\n\\nHow to calibrate:\\n1. Run the pressure advance test for at least 3 speeds per acceleration value. It is recommended that the test is run for at least the speed of the external perimeters, the speed of the internal perimeters and the fastest feature print speed in your profile (usually its the sparse or solid infill). Then run them for the same speeds for the slowest and fastest print accelerations, and no faster than the recommended maximum acceleration as given by the Klipper input shaper\\n2. Take note of the optimal PA value for each volumetric flow speed and acceleration. You can find the flow number by selecting flow from the color scheme drop down and move the horizontal slider over the PA pattern lines. The number should be visible at the bottom of the page. The ideal PA value should be decreasing the higher the volumetric flow is. If it is not, confirm that your extruder is functioning correctly. The slower and with less acceleration you print, the larger the range of acceptable PA values. If no difference is visible, use the PA value from the faster test\\n3. Enter the triplets of PA values, Flow and Accelerations in the text box here and save your filament profile.",
    (category)     = "Filament/Filament",
    (tab_type)     = "Filament",
    (tab_page)     = "Filament",
    (tab_optgroup)     = "Flow ratio and Pressure Advance",
    (height)     = 15,
