    (has_default)  = true,
    (default_value) = "eblDisabled",
    (enum_value_entries) = "disabled",
    (enum_value_entries) = "external_bridge_only",
    (enum_value_entries) = "internal_bridge_only",
    (enum_value_entries) = "apply_to_all",
    (enum_label_entries) = "Disabled",
    (enum_label_entries) = "External bridge only",
    (enum_label_entries) = "Internal bridge only",
    (enum_label_entries) = "Apply to all"
