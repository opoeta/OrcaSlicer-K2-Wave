              - filament_soluble
              - filament_is_support
              - filament_change_length
              - required_nozzle_HRC
              - default_filament_colour
              - filament_diameter
              - filament_adhesiveness_category
              - filament_density
              - filament_shrink
              - filament_shrinkage_compensation_z
              - filament_cost
              - temperature_vitrification
              - idle_temperature
              - [nozzle_temperature_range_low, nozzle_temperature_range_high]
