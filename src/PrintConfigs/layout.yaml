            fields:
              - [fan_min_speed, fan_cooling_layer_time]
              - [fan_max_speed, slow_down_layer_time]
              - reduce_fan_stop_start_freq
              - slow_down_for_layer_cooling
              - dont_slow_down_outer_wall
