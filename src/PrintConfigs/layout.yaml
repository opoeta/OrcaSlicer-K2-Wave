        icon: "custom-gcode_advanced"
        groups:
          - name: "Filament start G-code" # HOOK
            fields:
              - filament_start_gcode
          - name: "Change extrusion role G-code" # HOOK
            fields:
              - filament_change_extrusion_role_gcode
          - name: "Filament end G-code" # HOOK
            fields:
              - filament_end_gcode
